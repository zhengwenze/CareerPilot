services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: career-pilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: career_pilot
      POSTGRES_USER: career
      POSTGRES_PASSWORD: career
    ports:
      - "5432:5432"
    volumes:
      - career-pilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U career -d career_pilot" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: career-pilot-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6380:6379"
    volumes:
      - career-pilot-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: career-pilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: careerpilot
      MINIO_ROOT_PASSWORD: careerpilot123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - career-pilot-minio-data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: career-pilot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://career:career@postgres:5432/career_pilot
      - ALEMBIC_DATABASE_URL=postgresql+psycopg://career:career@postgres:5432/career_pilot
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_ACCESS_KEY=careerpilot
      - STORAGE_SECRET_KEY=careerpilot123
      - CORS_ORIGINS=http://localhost:3000,http://123.56.190.100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - career-pilot-backend-data:/app/data
      - ./apps/backend/.env:/app/.env:ro

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: career-pilot-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  career-pilot-postgres-data:
  career-pilot-redis-data:
  career-pilot-minio-data:
  career-pilot-backend-data:
