services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: career-pilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: career_pilot
      POSTGRES_USER: career
      POSTGRES_PASSWORD: career
    ports:
      - "5432:5432"
    volumes:
      - career-pilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career -d career_pilot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: career-pilot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - career-pilot-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: career-pilot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: careerpilot
      MINIO_ROOT_PASSWORD: careerpilot123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - career-pilot-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  career-pilot-postgres-data:
  career-pilot-redis-data:
  career-pilot-minio-data:
